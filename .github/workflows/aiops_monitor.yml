name: AIOps Scheduled Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: pip install requests cryptography urllib3
        
      - name: 安裝必要套件
        run: pip install requests cryptography urllib3 playwright  # 🌟 加入 playwright

      - name: 安裝瀏覽器驅動
        run: playwright install chromium --with-deps  # 🌟 安裝 Chromium 核心與依賴系統庫

      - name: 執行巡檢腳本 (包含 Teams 通報)
        env:
          # 直接貼上網址，不要加 ${{ }} 符號，那會導致語法錯誤
          TEAMS_WEBHOOK_URL: "https://defaultba8fa0ba104a445b8f4cd3194b3140.bb.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/69e1e744ff084a888b5b28a44e0d71a5/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=WfGQlnW_p8SVIgrxEjy3DipM85haVMyqZ7Q3j4bVf5Y"
        run: python monitor_sites.py

      - name: 更新網頁與指紋資料
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 強制抓取所有變動，包含 data/fingerprints.json
          git add .
          git commit -m "Auto: Update by Local Trigger [$(date)]" || echo "No changes to commit"
          git push
