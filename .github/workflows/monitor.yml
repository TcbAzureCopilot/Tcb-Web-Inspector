name: AIOps Advanced Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests cryptography
      - name: Execute Inspection
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python monitor_sites.py
      - name: Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AIOps Bot"
          git add index.html data/site_state.json
          git commit -m "Auto: Update monitoring dashboard" || exit 0
          git push
