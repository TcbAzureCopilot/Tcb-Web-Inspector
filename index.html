<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCB Web Inspector | 網頁脈搏守護者</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-cyan: #00f2ff;
            --status-green: #2ecc71;
            --status-red: #e74c3c;
            --status-yellow: #f1c40f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題區塊 */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-cyan);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--accent-cyan);
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 5px var(--accent-cyan); }
            50% { opacity: 0.3; }
            100% { opacity: 1; box-shadow: 0 0 5px var(--accent-cyan); }
        }

        /* 儀表板主表格 */
        .dashboard-table {
            width: 100%;
            max-width: 1200px;
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dashboard-table th {
            background-color: #1f242c;
            color: var(--accent-cyan);
            text-align: left;
            padding: 15px;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
        }

        .dashboard-table tr:hover {
            background-color: #1c2128;
        }

        /* 狀態標籤樣式 */
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .status-green { color: var(--status-green); border: 1px solid var(--status-green); }
        .status-red { color: var(--status-red); border: 1px solid var(--status-red); animation: shake 0.5s infinite; }
        .status-yellow { color: var(--status-yellow); border: 1px solid var(--status-yellow); }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px,0); }
            50% { transform: translate(-2px,0); }
            75% { transform: translate(2px,0); }
            100% { transform: translate(0,0); }
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #8b949e;
        }

        a { color: var(--accent-cyan); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TCB WEB MONITORING CENTER</h1>
        <div class="live-indicator">
            <span class="dot"></span> SYSTEM ACTIVE | LAST UPDATE: <span id="update-time">--:--</span>
        </div>
    </div>

    <table class="dashboard-table">
        <thead>
            <tr>
                <th>系統名稱</th>
                <th>當前狀態</th>
                <th>SSL 效期</th>
                <th>回應延遲</th>
                <th>指紋狀態</th>
                <th>快速連結</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <div class="footer">
        © 2026 Tcb-Web-Inspector | AIOps 維運自動化系統 | 數據僅供內部參考
    </div>

</body>
</html>
